<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ЕГЭ Обществознание – Тренажер</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-front-bg: #ffffff;
      --card-back-bg: #eff6ff;
      --border-color: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #10b981;
      --error: #ef4444;
      --shadow-color: rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
      
      --bg-left: rgba(239, 68, 68, 0.06);
      --bg-right: rgba(16, 185, 129, 0.06);
      --text-left: #ef4444;
      --text-right: #10b981;
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-front-bg: #1e293b;
      --card-back-bg: #172554;
      --border-color: #334155;
      --accent: #3b82f6;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 15px 30px -5px rgba(0, 0, 0, 0.7);
      
      --bg-left: rgba(248, 113, 113, 0.1);
      --bg-right: rgba(52, 211, 153, 0.1);
      --text-left: #f87171;
      --text-right: #34d399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: var(--bg-color);
      color: var(--text-main);
      touch-action: none;
      display: flex;
      flex-direction: column;
    }

    /* --- СТАРТОВЫЙ ЭКРАН --- */
    .splash-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      padding: 1.5rem;
      text-align: center;
    }
    .splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-title {
      font-size: clamp(1.2rem, 8vw, 3rem);
      font-weight: 800;
      margin-bottom: 1rem;
      max-width: 100%;
      word-wrap: break-word;
    }
    .splash-subtitle {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      max-width: 400px;
    }
    .start-btn {
      background-color: var(--accent);
      color: #fff;
      border: none;
      padding: 1rem 3rem;
      border-radius: 99px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
      animation: pulse 2s infinite;
    }
    .start-btn:active { transform: scale(0.95); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5); }
      70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease;
    }
    .app-container.visible {
      opacity: 1;
      visibility: visible;
    }

    /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
    .app-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 15px 10px;
      gap: 10px;
      background-color: var(--bg-color);
      z-index: 50;
      padding-top: env(safe-area-inset-top);
    }
    
    .app-logo {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .actions-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 500px) {
      .app-logo {
        display: none;
      }
      .app-header {
        justify-content: flex-end;
      }
    }

    .icon-btn {
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 4px var(--shadow-color);
      flex-shrink: 0;
    }
    .icon-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-blue {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-blue:active {
      background-color: var(--accent-hover);
    }

    .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .btn-blue svg { stroke: #fff; fill: none; }

    /* ВКЛАДКИ */
    .tabs-wrapper {
      flex-shrink: 0;
      padding: 0 15px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .tabs-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: center;
      padding-bottom: 2px;
    }
    .tabs-row::-webkit-scrollbar { display: none; }
    
    .tab-btn {
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 14px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 1px 3px var(--shadow-color);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-btn.compact {
      padding: 6px 12px;
      min-width: 40px;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
      border-radius: 99px;
      padding: 2px 6px;
      font-size: 0.75rem;
      margin-left: 6px;
      font-weight: 700;
    }
    .tab-btn.active .tab-count {
      background: rgba(255, 255, 255, 0.25);
      color: inherit;
    }

    /* РАЗДЕЛЕННЫЙ ФОН */
    .board {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .bg-split {
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      display: flex;
      z-index: 1;
    }
    .bg-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .bg-left { background-color: var(--bg-left); }
    .bg-right { background-color: var(--bg-right); }
    
    .bg-label {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      opacity: 0.25;
    }
    .bg-left .bg-label { color: var(--text-left); }
    .bg-right .bg-label { color: var(--text-right); }
    
    .bg-sublabel {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.3;
      margin-top: 10px;
    }

    /* КАРТОЧКА */
    .card-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 10;
      padding: 15px; 
      min-height: 0;
    }

    .card-wrapper {
      position: relative;
      width: 85vw;
      max-width: 320px;
      height: 55vh;
      max-height: 440px;
      min-height: 320px;
      perspective: 1000px;
      cursor: grab;
      touch-action: pan-y;
    }
    @media (min-width: 768px) {
      .card-wrapper { max-width: 380px; max-height: 480px; }
    }
    @media (max-height: 700px) {
      .card-wrapper { height: 380px; }
    }
    .card-wrapper:active { cursor: grabbing; }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }
    .card-wrapper.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      background: var(--card-front-bg);
      border: 2px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }
    .card-back {
      background: var(--card-back-bg);
      transform: rotateY(180deg);
      border-color: var(--accent);
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow-y: auto;
      pointer-events: auto;
    }
    .card-content::-webkit-scrollbar { display: none; }
    .card-content { scrollbar-width: none; }

    .card-text {
      width: 100%;
      font-weight: 700;
      line-height: 1.4;
      /* Отключаем перенос и разрыв слов, чтобы полагаться только на скрипт масштабирования */
      word-break: normal;
      overflow-wrap: normal;
      hyphens: none;
      color: var(--text-main);
    }
    .card-back .card-text {
      font-weight: 500;
    }

    .card-hint {
      margin-top: auto;
      padding-top: 15px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* БЕЙДЖИ СВАЙПА */
    .badge {
      position: absolute;
      top: 20px;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1.2rem;
      text-transform: uppercase;
      opacity: 0;
      z-index: 20;
      border: 3px solid;
      pointer-events: none;
    }
    .badge-nope {
      right: 20px;
      color: var(--error);
      border-color: var(--error);
      transform: rotate(15deg);
    }
    .badge-like {
      left: 20px;
      color: var(--success);
      border-color: var(--success);
      transform: rotate(-15deg);
    }

    /* КНОПКИ ДЕЙСТВИЙ */
    .action-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      padding: 10px 15px 30px; 
      z-index: 20;
      flex-shrink: 0;
    }

    .btn-action {
      border-radius: 50%;
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 10px var(--shadow-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
    }
    .btn-action:active {
      transform: scale(0.85);
      box-shadow: 0 2px 5px var(--shadow-color);
    }

    .btn-no { width: 64px; height: 64px; color: var(--error); }
    .btn-no svg { width: 28px; height: 28px; fill: currentColor; }
    .btn-no:hover { background: var(--error); color: #fff; border-color: var(--error); }

    .btn-flip { width: 50px; height: 50px; color: var(--accent); }
    .btn-flip svg { width: 24px; height: 24px; fill: currentColor; }
    .btn-flip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-yes { width: 64px; height: 64px; color: var(--success); }
    .btn-yes svg { width: 32px; height: 32px; fill: currentColor; }
    .btn-yes:hover { background: var(--success); color: #fff; border-color: var(--success); }

    /* ПУСТОЕ СОСТОЯНИЕ */
    .empty-state {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-muted);
      display: none;
      z-index: 5;
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.5;}
    .empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-main); }
    .empty-state p { font-size: 0.95rem; }

    /* ИЗМЕРИТЕЛЬ ТЕКСТА */
    #text-measurer {
      position: absolute;
      left: -9999px;
      visibility: hidden;
      font-weight: 700;
      line-height: 1.4;
      word-break: normal;
      overflow-wrap: normal;
      hyphens: none;
    }

  </style>
</head>
<body>

  <svg style="display: none;">
    <defs>
      <symbol id="icon-sun" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-1.5a.75.75 0 01.75-.75zM6.166 17.834a.75.75 0 00-1.06 1.06l1.59 1.591a.75.75 0 101.06-1.061l-1.59-1.59zM4.5 12a.75.75 0 01-.75.75H1.5a.75.75 0 010-1.5h2.25a.75.75 0 01.75.75zM6.166 6.166a.75.75 0 001.06-1.06l-1.59-1.59a.75.75 0 00-1.061 1.06l1.59 1.59z"/></symbol>

        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>

  </svg>

  <div id="text-measurer"></div>

  <!-- СТАРТОВЫЙ ЭКРАН -->
  <div id="splash" class="splash-screen">
    <h1 class="splash-title">ОБЩЕСТВОЗНАНИЕ</h1>
    <p class="splash-subtitle">Тренажер терминов. Свайп вправо – если знаешь. Свайп влево – чтобы повторить. Тапни, чтобы перевернуть.</p>
    <button id="btn-start" class="start-btn">Начать изучение</button>
  </div>

  <div id="app" class="app-container">
    
    <header class="app-header">
      <div class="app-logo">ОБЩЕСТВОЗНАНИЕ</div>
      <div class="actions-nav">
        <button class="icon-btn" id="btn-reverse" title="Реверс карточек"><svg><use href="#icon-reverse"></use></svg></button>
        <button class="icon-btn" id="btn-theme" title="Сменить тему"><svg><use href="#icon-moon"></use></svg></button>
        <button class="icon-btn btn-blue" id="btn-fullscreen" title="На весь экран"><svg><use id="icon-fullscreen-use" href="#icon-maximize"></use></svg></button>
      </div>
    </header>

    <div class="tabs-wrapper">
      <div class="tabs-row" id="section-tabs">
        <button class="tab-btn active" data-sec="all">Все разделы</button>
        <button class="tab-btn" data-sec="1">1 Раздел</button>
        <button class="tab-btn compact" data-sec="2">2</button>
        <button class="tab-btn compact" data-sec="3">3</button>
        <button class="tab-btn compact" data-sec="4">4</button>
        <button class="tab-btn compact" data-sec="5">5</button>
      </div>
      <div class="tabs-row" id="status-tabs">
        <button class="tab-btn" data-status="all">Все термины <span class="tab-count" id="count-all">0</span></button>
        <button class="tab-btn active" data-status="to-learn">Осталось выучить <span class="tab-count" id="count-to-learn">0</span></button>
        <button class="tab-btn" data-status="learned">Выученные <span class="tab-count" id="count-learned">0</span></button>
      </div>
    </div>

    <main class="board" id="board">
      <div class="bg-split">
        <div class="bg-half bg-left">
          <div class="bg-label">НЕТ</div>
          <div class="bg-sublabel">Повторить</div>
        </div>
        <div class="bg-half bg-right">
          <div class="bg-label">ДА</div>
          <div class="bg-sublabel">Знаю отлично</div>
        </div>
      </div>
      
      <div class="empty-state" id="empty-state">
        <svg><use href="#icon-empty"></use></svg>
        <h2>Все готово!</h2>
        <p>В этой категории карточки закончились.</p>
      </div>
      
      <div class="card-area" id="card-area"></div>

      <div class="action-buttons" id="action-buttons">
        <button class="btn-action btn-no" id="btn-swipe-no" aria-label="Не знаю">
          <svg><use href="#icon-x"></use></svg>
        </button>
        <button class="btn-action btn-flip" id="btn-swipe-flip" aria-label="Перевернуть">
          <svg><use href="#icon-refresh"></use></svg>
        </button>
        <button class="btn-action btn-yes" id="btn-swipe-yes" aria-label="Знаю">
          <svg><use href="#icon-check"></use></svg>
        </button>
      </div>
    </main>
  </div>

  <script>
    // --- БАЗА ДАННЫХ ---
    const rawData = `
    1|1|Общество|обособившаяся от природы, но тесно с ней связанная часть материального мира, включающая в себя формы объединения людей и способы их взаимодействия.
    1|1|Общественные отношения|устойчивые формы взаимодействия людей и социальных групп, возникающие в процессе совместной деятельности.

      if(!target) return;
      
      document.querySelectorAll('#section-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      currentSection = target.dataset.sec;
      loadDeck();
    });

    document.getElementById('status-tabs').addEventListener('click', (e) => {
      let target = e.target;
      if (!target.classList.contains('tab-btn')) {
        target = target.closest('.tab-btn');
      }
      if(!target) return;
      
      document.querySelectorAll('#status-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      currentStatus = target.dataset.status;
      loadDeck();
    });

    document.getElementById('btn-swipe-no').addEventListener('click', () => {
      if (activeCardContext) activeCardContext.triggerSwipe(-1);
    });
    document.getElementById('btn-swipe-yes').addEventListener('click', () => {
      if (activeCardContext) activeCardContext.triggerSwipe(1);
    });
    document.getElementById('btn-swipe-flip').addEventListener('click', () => {
      if (activeCardContext) activeCardContext.triggerFlip();
    });

    function updateCounters() {
      const sectionData = database.filter(item => currentSection === 'all' || item.section == currentSection);
      const total = sectionData.length;
      const learned = sectionData.filter(item => learnedIds.has(item.id)).length;
      const toLearn = total - learned;
      
      if (document.getElementById('count-all')) document.getElementById('count-all').textContent = total;
      if (document.getElementById('count-to-learn')) document.getElementById('count-to-learn').textContent = toLearn;
      if (document.getElementById('count-learned')) document.getElementById('count-learned').textContent = learned;
    }

    function loadDeck() {
      if (activeCardContext) activeCardContext.removeCard();
      activeCardContext = null;

      updateCounters();

      deck = database.filter(item => {
        const passSection = currentSection === 'all' || item.section == currentSection;
        const isLearned = learnedIds.has(item.id);
        
        let passStatus = false;
        if (currentStatus === 'all') passStatus = true;
        if (currentStatus === 'to-learn' && !isLearned) passStatus = true;
        if (currentStatus === 'learned' && isLearned) passStatus = true;
        
        return passSection && passStatus;
      });

      deck.sort(() => Math.random() - 0.5); 

      nextCard();
    }

    function fitText(textElement, text, parentCard) {
      if (text && text.length > 0) {
        text = text.charAt(0).toUpperCase() + text.slice(1);
      }
      
      textMeasurer.textContent = text;
      let fontSize = window.innerWidth > 768 ? 26 : 20; 
      
      // Динамически получаем реальные размеры текущей карточки на экране
      const cardRect = parentCard ? parentCard.getBoundingClientRect() : { width: Math.min(window.innerWidth * 0.85, 360), height: Math.min(window.innerHeight * 0.55, 440) };
      
      const maxW = cardRect.width - 48; // padding (1.5rem) * 2
      const maxH = cardRect.height - 80; // место под верхний отступ и нижнюю подсказку
      
      textMeasurer.style.width = maxW + 'px';
      textMeasurer.style.fontSize = fontSize + 'px';
      
      // Проверяем и высоту, И ширину (чтобы длинные слова не ломали верстку)
      while ((textMeasurer.scrollHeight > maxH || textMeasurer.scrollWidth > maxW) && fontSize > 10) {
        fontSize -= 0.5;
        textMeasurer.style.fontSize = fontSize + 'px';
      }
      
      textElement.style.fontSize = fontSize + 'px';
      textElement.textContent = text;
    }

    function nextCard() {
      if (deck.length === 0) {
        emptyState.style.display = 'block';
        actionButtons.style.display = 'none';
        activeCardContext = null;
        return;
      }
      
      emptyState.style.display = 'none';
      actionButtons.style.display = 'flex';
      
      const item = deck[0];

      const frontText = isReverseMode ? item.def : item.term;
      const backText = isReverseMode ? item.term : item.def;

      const cardWrapper = document.createElement('div');
      cardWrapper.className = 'card-wrapper';
      cardWrapper.id = 'active-card';
      
      cardWrapper.innerHTML = `
        <div class="card-inner">
          <div class="card-face">
            <div class="badge badge-nope">Повторить</div>
            <div class="badge badge-like">Выучил</div>
            <div class="card-content" id="cf-text"></div>
            <div class="card-hint">Раздел ${item.section} • Тема ${item.topic}</div>
          </div>
          <div class="card-face card-back">
            <div class="badge badge-nope">Повторить</div>
            <div class="badge badge-like">Выучил</div>
            <div class="card-content" id="cb-text"></div>
            <div class="card-hint">Раздел ${item.section} • Тема ${item.topic}</div>
          </div>
        </div>
      `;
      
      cardArea.appendChild(cardWrapper);

      // Измеряем карточку прямо в DOM
      fitText(document.getElementById('cf-text'), frontText, cardWrapper);
      fitText(document.getElementById('cb-text'), backText, cardWrapper);

      initSwipeAndFlip(cardWrapper, item);
    }

    // --- УНИВЕРСАЛЬНАЯ ЛОГИКА СВАЙПА И ТАПА (MOBILE + DESKTOP) ---
    function initSwipeAndFlip(card, itemData) {
      const badgesLike = card.querySelectorAll('.badge-like');
      const badgesNope = card.querySelectorAll('.badge-nope');

      const setBadgesOpacity = (dx) => {
        const likeOp = dx > 20 ? Math.min(dx / 100, 1) : 0;
        const nopeOp = dx < -20 ? Math.min(Math.abs(dx) / 100, 1) : 0;
        badgesLike.forEach(b => b.style.opacity = likeOp);
        badgesNope.forEach(b => b.style.opacity = nopeOp);
      };

      const swipeOut = (direction) => {
        const moveX = direction * window.innerWidth;
        card.style.transition = 'transform 0.3s ease-out';
        card.style.transform = `translate(${moveX}px, 0) rotate(${direction * 20}deg)`;
        
        setTimeout(() => {
          card.remove();
          activeCardContext = null;
          
          const currentItem = deck.shift();
          
          if (direction > 0) {
            learnedIds.add(currentItem.id);
          } else {
            learnedIds.delete(currentItem.id);
            if (currentStatus === 'all' || currentStatus === 'to-learn') {
              deck.push(currentItem);
            }
          }
          
          updateCounters();
          nextCard();
        }, 300);
      };

      const triggerFlip = () => {
        if (navigator.vibrate) navigator.vibrate(30); // Вибрация при тапе
        card.classList.toggle('flipped');
      };

      activeCardContext = {
        triggerSwipe: (direction) => {
          setBadgesOpacity(direction * 100);
          swipeOut(direction);
        },
        triggerFlip: triggerFlip,
        removeCard: () => {
          card.remove();
        }
      };

      // Проверяем тип устройства
      const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

      if (isTouchDevice) {
        // --- ЛОГИКА ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ (TOUCH) ---
        let isDragging = false;
        let hasMoved = false;
        let isScrolling = false;
        let startX, startY;

        card.addEventListener('touchstart', (e) => {
          isDragging = true;
          hasMoved = false;
          isScrolling = false;
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          card.style.transition = 'none';
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
          if (!isDragging) return;
          let dx = e.touches[0].clientX - startX;
          let dy = e.touches[0].clientY - startY;

          if (!hasMoved && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
            hasMoved = true;
            if (Math.abs(dy) > Math.abs(dx)) {
              isScrolling = true; // Скроллинг текста (вертикальное движение)
            }
          }

          if (isScrolling) return;

          // Блокируем навигацию Chrome при горизонтальном свайпе
          if (e.cancelable) e.preventDefault();

          card.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx * 0.05}deg)`;
          setBadgesOpacity(dx);
        }, { passive: false });

        card.addEventListener('touchend', (e) => {
          if (!isDragging) return;
          isDragging = false;

          // МОМЕНТАЛЬНЫЙ ТАП (если не было сдвига)
          if (!hasMoved && !isScrolling) {
            triggerFlip();
            card.style.transition = 'transform 0.4s ease';
            card.style.transform = '';
            return;
          }

          if (isScrolling) {
            card.style.transition = 'transform 0.4s ease';
            card.style.transform = '';
            return;
          }

          let dx = e.changedTouches[0].clientX - startX;
          const threshold = Math.min(window.innerWidth * 0.25, 80);
          
          if (dx > threshold) {
            swipeOut(1);
          } else if (dx < -threshold) {
            swipeOut(-1);
          } else {
            card.style.transition = 'transform 0.4s ease';
            card.style.transform = '';
            setBadgesOpacity(0);
          }
        });

      } else {
        // --- ЛОГИКА ДЛЯ ПК И НОУТБУКОВ (MOUSE) ---
        let isDragging = false;
        let hasMoved = false;
        let startX, startY;

        const start = (e) => {
          if (e.button !== 0) return;
          isDragging = true;
          hasMoved = false;
          startX = e.clientX;
          startY = e.clientY;
          card.style.transition = 'none';
        };

        const move = (e) => {
          if (!isDragging) return;
          let dx = e.clientX - startX;
          let dy = e.clientY - startY;

          if (!hasMoved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
            hasMoved = true;
          }

          if (hasMoved) {
            e.preventDefault(); // Предотвращаем выделение текста мышкой
            card.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx * 0.05}deg)`;
            setBadgesOpacity(dx);
          }
        };

        const end = (e) => {
          if (!isDragging) return;
          isDragging = false;

          // МОМЕНТАЛЬНЫЙ КЛИК ПО КАРТОЧКЕ
          if (!hasMoved) {
            triggerFlip();
            card.style.transition = 'transform 0.4s ease';
            card.style.transform = '';
            return;
          }

          let dx = e.clientX - startX;
          const threshold = 80;
          
          if (dx > threshold) swipeOut(1);
          else if (dx < -threshold) swipeOut(-1);
          else {
            card.style.transition = 'transform 0.4s ease';
            card.style.transform = '';
            setBadgesOpacity(0);
          }
        };

        card.addEventListener('mousedown', start);
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', end);
      }
    }

    window.addEventListener('resize', () => {
      const frontText = document.getElementById('cf-text');
      const backText = document.getElementById('cb-text');
      const activeCard = document.getElementById('active-card');
      if(frontText && backText && activeCard) {
        fitText(frontText, frontText.textContent, activeCard);
        fitText(backText, backText.textContent, activeCard);
      }
    });

  </script>
